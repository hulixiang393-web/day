// 生成单周总结
App._generateWeekSummary = function(weekStart, weekEnd) {
  const plans = Store.plans();
  const tasks = Store.tasks();
  const focusLogs = Store.get('focus_logs')||[];

  const weekPlans = plans.filter(function(p){return p.deadline>=weekStart&&p.deadline<=weekEnd;});
  const weekTasks = tasks.filter(function(t){
    const plan = plans.find(function(p){return p.id===t.planId;});
    return plan && plan.deadline>=weekStart && plan.deadline<=weekEnd;
  });

  const plansDone = weekPlans.filter(function(p){return p.status==='done';}).length;
  const tasksDone = weekTasks.filter(function(t){return t.status==='done';}).length;
  const tasksOverdue = weekTasks.filter(function(t){return t.status==='overdue';}).length;
  const totalTasks = weekTasks.length;
  const focusMinutes = focusLogs.filter(function(l){return l.date>=weekStart&&l.date<=weekEnd;}).reduce(function(sum,l){return sum+(l.minutes||0);}, 0);

  const rate = totalTasks>0 ? tasksDone/totalTasks : 0;
  let comment = '继续加油哦~';
  if(rate >= 0.9) comment = '太厉害了！上周表现超棒，小人也为你骄傲呢！✨';
  else if(rate >= 0.7) comment = '不错的完成率！保持这个节奏继续前进吧~ 💪';
  else if(rate >= 0.5) comment = '完成了一半以上，还有进步空间，这周继续努力！🌸';
  else if(totalTasks===0) comment = '上周比较悠闲呢，这周要不要制定一些计划？';
  else comment = '完成率有点低，不过没关系，新的一周新的开始！🌟';

  return {
    weekStart: weekStart, weekEnd: weekEnd,
    plansDone: plansDone, tasksDone: tasksDone, tasksOverdue: tasksOverdue,
    totalPlans: weekPlans.length, totalTasks: totalTasks,
    focusMinutes: focusMinutes, tagCount: {}, comment: comment,
    createdAt: now(),
  };
};

// 生成周总结（回填最近4周）
App.generateWeeklySummary = function() {
  const today_ = today();
  const dt = new Date(today_+'T00:00:00');
  const summaries = Store.get('summaries') || [];
  let generated = 0;
  // 回填过去4个周一（共4周）
  for(let w=0; w<4; w++) {
    const monday = addDays(today_, -dt.getDay() - 7*(w+1) + 1); // 上周一、再上周一...
    const sunday = addDays(monday, 6);
    // 该周数据是否在7天前到昨天之间？（避免为未来周或太旧的周生成）
    if(monday > today_) continue;
    if(summaries.some(function(s){return s.weekStart===monday;})) continue;
    const sum = App._generateWeekSummary(monday, sunday);
    summaries.push(sum);
    generated++;
  }
  if(generated > 0) {
    Store.set('summaries', summaries);
    setTimeout(function(){ App.toast('📊 已生成 '+generated+' 周总结，点击查看~', 'info'); }, 2000);
  }
};

// PART 18.5: 日视图拖拽系统
// ============================================================
const DayViewDrag = {
  _dragging: null,
  _snapMinutes: 15,

  onTaskMouseDown(e, taskId) {
    if(e.button !== 0) return;
    if(e.target.classList.contains('resize-handle')) return;
    e.preventDefault();
    const block = document.querySelector('.day-task-block[data-task-id="'+taskId+'"]');
    if(!block || block.classList.contains('done')) return;
    const task = Store.taskById(taskId);
    if(!task) return;

    this._dragging = {
      taskId, type: 'move',
      startY: e.clientY,
      origTop: parseInt(block.style.top),
      origHeight: parseInt(block.style.height),
      origStartHour: task.startHour,
      origDuration: task.duration,
      block,
    };
    block.classList.add('dragging');

    const onMove = function(ev) {
      if(!DayViewDrag._dragging || DayViewDrag._dragging.type !== 'move') return;
      const dy = ev.clientY - DayViewDrag._dragging.startY;
      const snapped = Math.round(dy / (60/60*DayViewDrag._snapMinutes)) * (60/60*DayViewDrag._snapMinutes);
      let newTop = DayViewDrag._dragging.origTop + snapped;
      newTop = Math.max(0, Math.min(23*60, newTop));
      DayViewDrag._dragging.block.style.top = newTop + 'px';
    };

    const onUp = function() {
      if(!DayViewDrag._dragging || DayViewDrag._dragging.type !== 'move') return;
      const block = DayViewDrag._dragging.block;
      block.classList.remove('dragging');
      const currentTop = parseInt(block.style.top) || DayViewDrag._dragging.origTop;
      const dy = currentTop - DayViewDrag._dragging.origTop;
      const snapped = Math.round(dy / (60/60*DayViewDrag._snapMinutes)) * (60/60*DayViewDrag._snapMinutes);
      if(Math.abs(snapped) >= DayViewDrag._snapMinutes/60*60) {
        const totalMinutes = Math.round((DayViewDrag._dragging.origTop + snapped) / (60/60));
        const h = Math.floor(totalMinutes / 60);
        const m = totalMinutes % 60;
        const newStartHour = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
        const task_ = Store.taskById(DayViewDrag._dragging.taskId);
        if(task_) {
          task_.startHour = newStartHour;
          Store.saveTask(task_);
          App.toast('任务移至 '+newStartHour,'info');
        }
      }
      DayViewDrag._dragging = null;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      App.renderDayView();
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  },

  onResizeMouseDown(e, taskId) {
    e.preventDefault();
    e.stopPropagation();
    const block = document.querySelector('.day-task-block[data-task-id="'+taskId+'"]');
    if(!block || block.classList.contains('done')) return;
    const task = Store.taskById(taskId);
    if(!task) return;

    this._dragging = {
      taskId, type: 'resize',
      startY: e.clientY,
      origHeight: parseInt(block.style.height),
      origDuration: task.duration || 30,
      block,
    };
    block.classList.add('dragging');

    const onMove = function(ev) {
      if(!DayViewDrag._dragging || DayViewDrag._dragging.type !== 'resize') return;
      const dy = ev.clientY - DayViewDrag._dragging.startY;
      const snapped = Math.round(dy / (60/60*DayViewDrag._snapMinutes)) * (60/60*DayViewDrag._snapMinutes);
      let newHeight = Math.max(26, DayViewDrag._dragging.origHeight + snapped);
      newHeight = Math.min(24*60, newHeight);
      DayViewDrag._dragging.block.style.height = newHeight + 'px';
    };

    const onUp = function() {
      if(!DayViewDrag._dragging || DayViewDrag._dragging.type !== 'resize') return;
      const block = DayViewDrag._dragging.block;
      block.classList.remove('dragging');
      const newHeight = parseInt(block.style.height);
      const newMinutes = Math.round(newHeight / (60/60) / DayViewDrag._snapMinutes) * DayViewDrag._snapMinutes;
      const finalMinutes = Math.max(5, Math.min(480, newMinutes || DayViewDrag._dragging.origDuration));
      if(finalMinutes !== DayViewDrag._dragging.origDuration) {
        const task_ = Store.taskById(DayViewDrag._dragging.taskId);
        if(task_) {
          task_.duration = finalMinutes;
          Store.saveTask(task_);
          App.toast('任务时长调整为 '+finalMinutes+'分钟','info');
        }
      }
      DayViewDrag._dragging = null;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      App.renderDayView();
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  },
};

// PART 19: 专注模式
// ============================================================
const FocusTimer = {
  _seconds: 0, _total: 0, _taskId: null, _paused: false, _interval: null,

  startForTask(taskId) {
    const task = Store.taskById(taskId);
    if(!task) { App.toast('任务不存在','error'); return; }
    this._taskId = taskId;
    this._total = (task.duration||25) * 60;
    this._seconds = this._total;
    this._paused = false;
    this._start();
    Mascot.say('focus_start');
  },

  startCustom(minutes) {
    this._taskId = null;
    this._total = (minutes||25) * 60;
    this._seconds = this._total;
    this._paused = false;
    this._start();
  },

  _start() {
    document.getElementById('focus-overlay').classList.add('active');
    this._updateDisplay();
    this._interval = setInterval(()=>this._tick(), 1000);
    document.getElementById('focus-pause-btn').textContent = '⏯ 暂停';
  },

  _tick() {
    if(this._paused) return;
    this._seconds--;
    this._updateDisplay();
    if(this._seconds <= 0) {
      this._finish();
    }
  },

  _updateDisplay() {
    const m = Math.floor(Math.abs(this._seconds)/60);
    const s = Math.abs(this._seconds)%60;
    document.getElementById('focus-timer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },

  togglePause() {
    this._paused = !this._paused;
    document.getElementById('focus-pause-btn').textContent = this._paused?'▶ 继续':'⏯ 暂停';
    document.getElementById('focus-label').textContent = this._paused?'已暂停...':'专注中...';
  },

  _logAndFinish(minutes) {
    clearInterval(this._interval);
    this._interval = null;
    document.getElementById('focus-overlay').classList.remove('active');
    if(minutes > 0) {
      var logs = Store.get('focus_logs')||[];
      logs.push({date:today(), minutes:minutes, taskId:this._taskId, createdAt:now()});
      Store.set('focus_logs', logs);
      App.toast('专注完成！'+minutes+'分钟 🔔','success');
      Mascot.say('focus_end');
      if(this._taskId) {
        var task = Store.taskById(this._taskId);
        if(task && task.status !== 'done') {
          task.status = 'done';
          task.completedAt = now();
          Store.saveTask(task);
        }
      }
    }
  },

  stop() {
    var completed = Math.round((this._total - this._seconds)/60);
    this._logAndFinish(completed);
    if(completed <= 0) App.toast('专注已取消','info');
    this._taskId = null;
    this._seconds = 0;
  },

  _finish() {
    try {
      var ctx = new (window.AudioContext||window.webkitAudioContext)();
      [523,659,784].forEach(function(freq,i){
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, ctx.currentTime+i*0.15);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+i*0.15+0.3);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime+i*0.15); osc.stop(ctx.currentTime+i*0.15+0.3);
      });
    } catch(e) {}
    this._logAndFinish(Math.round(this._total/60));
    this._taskId = null;
    this._seconds = 0;
  }
};

const Reminder = {
  _checked: {},
  _interval: null,

  init() {
    this._interval = setInterval(() => this.check(), 30000); // 每30秒检查
    this.check();
  },

  check() {
    if(!('Notification' in window)) return;
    const s = Store.settings();
    const now_ = new Date();
    const timeStr = now_.toTimeString().slice(0,5);

    // 免打扰时段
    if(s.quietStart && s.quietEnd) {
      if(s.quietStart < s.quietEnd) {
        if(timeStr >= s.quietStart && timeStr < s.quietEnd) return;
      } else {
        if(timeStr >= s.quietStart || timeStr < s.quietEnd) return;
      }
    }

    const today_ = today();
    const plans = Store.plans().filter(function(p){return p.status==='active';}); // 暂停的计划不提醒
    const allTasks = Store.tasks().filter(t=>t.status==='pending');

    allTasks.forEach(task => {
      const plan = plans.find(p=>p.id===task.planId);
      if(!plan) return;
      if(plan.status==='paused') return; // 暂停计划不提醒

      // 检查计划截止日期
      if(plan.deadline !== today_) return;

      if(!task.reminders || !task.reminders.length) return;
      if(!task.startHour) return;

      const [h,m] = task.startHour.split(':').map(Number);
      const taskTime = h*60 + m;

      task.reminders.forEach(rem => {
        const remindTime = taskTime - rem.minutesBefore;
        const nowTime = now_.getHours()*60 + now_.getMinutes();
        const key = task.id+'_'+rem.minutesBefore+'_'+today_;

        if(nowTime >= remindTime && nowTime < remindTime+2 && !this._checked[key]) {
          this._checked[key] = true;
          this.notify(task, plan);
        }
      });
    });

    // 清理过期key
    const keys = Object.keys(this._checked);
    if(keys.length > 1000) {
      keys.forEach(k=>{ if(!k.endsWith('_'+today_)) delete this._checked[k]; });
    }
  },

  notify(task, plan) {
    // 页面内弹窗
    const content = `
      <div style="text-align:center">
        <div style="font-size:3rem;margin-bottom:12px">⏰</div>
        <h3>任务提醒</h3>
        <p style="margin:8px 0"><strong>${task.title}</strong></p>
        <p style="font-size:0.85rem;color:var(--text-secondary)">所属计划：${plan.title}</p>
        <p style="font-size:0.85rem;color:var(--text-secondary)">时间：${task.startHour} · ${task.duration||0}分钟</p>
        <div style="margin-top:16px">
          <button class="btn btn-primary btn-sm" onclick="FocusTimer.startForTask('${task.id}');Modal.close()">▶ 开始专注</button>
          <button class="btn btn-secondary btn-sm" onclick="Modal.close()">知道了</button>
        </div>
      </div>`;
    Modal.show(content, {title:'', narrow:true});
    Mascot.say('reminder');

    // 系统通知
    if('Notification' in window && Notification.permission==='granted') {
      new Notification('⏰ 任务提醒', {body: `${task.title} - ${task.startHour}`, icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="40" r="20" fill="%23FF7EB3"/></svg>'});
    } else if('Notification' in window && Notification.permission==='default') {
      Notification.requestPermission();
    }

    // 轻音效
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime+0.5);
    } catch(e) {}
  }
};

  // 拖拽（仅在拖拽时跟随鼠标）
  bindDrag() {
    const el = document.getElementById('mascot');
    const body = document.getElementById('mascot-body');
    let startX, startY, origLeft, origTop;
    const elStyle = el.style;

    const onStart = (e) => {
      e.preventDefault();
      this._dragging = false;
      startX = e.touches?e.touches[0].clientX:e.clientX;
      startY = e.touches?e.touches[0].clientY:e.clientY;
      const rect = el.getBoundingClientRect();
      origLeft = rect.left;
      origTop = rect.top;
      this._offsetX = startX - origLeft;
      this._offsetY = startY - origTop;
      // 仅在拖拽开始时绑定移动和释放事件
      document.addEventListener('mousemove', onMove);
      document.addEventListener('touchmove', onMove, {passive:false});
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
      // 拖拽时取消动画，固定位置
      el.classList.remove('anim-float');
      elStyle.left = origLeft + 'px';
      elStyle.top = origTop + 'px';
      elStyle.right = 'auto';
      elStyle.bottom = 'auto';
      elStyle.transition = 'none';
    };

    const onMove = (e) => {
      const clientX = e.touches?e.touches[0].clientX:e.clientX;
      const clientY = e.touches?e.touches[0].clientY:e.clientY;
      const dx = clientX - startX;
      const dy = clientY - startY;
      if(Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        this._dragging = true;
      }
      if(this._dragging) {
        elStyle.left = (clientX - this._offsetX) + 'px';
        elStyle.top = (clientY - this._offsetY) + 'px';
      }
    };

    const onEnd = () => {
      // 移除拖拽事件监听
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchend', onEnd);
      // 恢复过渡动画（轻触=聊天由click事件处理，此处不重复触发）
      elStyle.transition = '';
      // 保持在新位置
    };

    body.addEventListener('mousedown', onStart);
    body.addEventListener('touchstart', onStart, {passive:false});
  },

  uploadImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          // 抠图处理：去除背景色，生成透明PNG
          const size = 160;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');

          // 计算缩放比例，保持比例居中裁剪
          const scale = Math.max(size/img.width, size/img.height);
          const sw = size/scale, sh = size/scale;
          const sx = (img.width-sw)/2, sy = (img.height-sh)/2;
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);

          // 获取像素数据
          const imageData = ctx.getImageData(0, 0, size, size);
          const pixels = imageData.data;

          // 采样四角确定背景色（取中位数）
          const corners = [
            pixels.slice(0,4),           // 左上
            pixels.slice((size-1)*4,(size-1)*4+4), // 右上
            pixels.slice((size*(size-1))*4,(size*(size-1))*4+4), // 左下
            pixels.slice((size*size-1)*4,(size*size-1)*4+4), // 右下
          ];
          const bgR = corners.reduce((s,c)=>s+c[0],0)/4;
          const bgG = corners.reduce((s,c)=>s+c[1],0)/4;
          const bgB = corners.reduce((s,c)=>s+c[2],0)/4;

          // 边缘检测：从四边各取5px宽度的像素计算平均背景色
          const edgeColors = [];
          for(let x=0; x<size; x++) {
            for(let y=0; y<5; y++) {
              const i = (y*size+x)*4;
              edgeColors.push([pixels[i],pixels[i+1],pixels[i+2]]);
            }
            for(let y=size-5; y<size; y++) {
              const i = (y*size+x)*4;
              edgeColors.push([pixels[i],pixels[i+1],pixels[i+2]]);
            }
          }
          for(let y=5; y<size-5; y++) {
            for(let x=0; x<5; x++) {
              const i = (y*size+x)*4;
              edgeColors.push([pixels[i],pixels[i+1],pixels[i+2]]);
            }
            for(let x=size-5; x<size; x++) {
              const i = (y*size+x)*4;
              edgeColors.push([pixels[i],pixels[i+1],pixels[i+2]]);
            }
          }
          const edgeR = edgeColors.reduce((s,c)=>s+c[0],0)/edgeColors.length;
          const edgeG = edgeColors.reduce((s,c)=>s+c[1],0)/edgeColors.length;
          const edgeB = edgeColors.reduce((s,c)=>s+c[2],0)/edgeColors.length;

          // 用边缘颜色作为主背景色
          const refR = edgeR, refG = edgeG, refB = edgeB;

          // 逐像素处理：接近背景色的像素变透明
          const tolerance = 60; // 容差
          for(let i=0; i<pixels.length; i+=4) {
            const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
            const dist = Math.sqrt((r-refR)**2+(g-refG)**2+(b-refB)**2);
            if(dist < tolerance) {
              // 接近背景色，设置透明度
              const alpha = Math.min(1, dist/tolerance);
              pixels[i+3] = Math.round(alpha * 255);
            }
            // 边缘羽化：适度扩展透明区域
          }

          ctx.putImageData(imageData, 0, 0);
          const dataUrl = canvas.toDataURL('image/png');
          Store.saveSettings({mascotImage: dataUrl});
          this.applyCustomImage(dataUrl);
          App.toast('小人形象已更新（已自动去背景）✨','success');
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };
    input.click();
  },

  // 从本地文件加载并处理图片
  async loadLocalImage(filePath) {
    // 这个方法用于加载项目目录下的图片
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = filePath;
    return new Promise((resolve, reject) => {
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error('图片加载失败'));
    });
  },

  applyCustomImage(dataUrl) {
    const body = document.getElementById('mascot-body');
    body.innerHTML = `<img src="${dataUrl}" class="mascot-img" alt="mascot">`;
  },

  resetImage() {
    Store.saveSettings({mascotImage: null});
    this.renderDefault();
    App.toast('已恢复默认形象','info');
  },
};

const Backup = {
  async exportData() {
    const password = prompt('请输入备份密码（用于加密备份文件，至少6位）：');
    if(!password) return;
    if(password.length < 6) { App.toast('密码至少6位','error'); return; }

    const data = {
      version: 2,
      exportedAt: now(),
      categories: Store.get('categories'),
      plans: Store.get('plans'),
      tasks: Store.get('tasks'),
      tags: Store.get('tags'),
      recycle: Store.get('recycle'),
      summaries: Store.get('summaries'),
      focus_logs: Store.get('focus_logs'),
      settings: Store.get('settings'),
    };

    try {
      const json = JSON.stringify(data);
      const encrypted = await aesEncrypt(json, password);

      // 下载
      const blob = new Blob([encrypted], {type:'application/octet-stream'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `anime-planner-backup-${today()}.apbak`;
      a.click();
      URL.revokeObjectURL(url);
      App.toast('备份文件已导出！🔐','success');
    } catch(e) {
      App.toast('导出失败：'+e.message,'error');
    }
  },

  async importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.apbak,.json';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      try {
        const text = await file.text();
        let data;

        // 尝试解密
        const password = prompt('请输入备份密码：');
        if(!password) return;

        // 先尝试AES解密
        const decrypted = await aesDecrypt(text, password);
        if(decrypted) {
          data = JSON.parse(decrypted);
        } else {
          // 尝试作为明文JSON解析
          try {
            data = JSON.parse(text);
          } catch(e2) {
            App.toast('密码错误或文件格式不正确','error');
            return;
          }
        }

        if(!data.version || (!Array.isArray(data.plans) && !Array.isArray(data.tasks))) {
          App.toast('无效的备份文件：数据格式不正确','error');
          return;
        }

        const mode = confirm('导入方式：\n"确定" = 覆盖现有数据\n"取消" = 合并导入（保留现有数据）');
        if(mode) {
          // 覆盖模式
          Store.set('categories', data.categories||[]);
          Store.set('plans', data.plans||[]);
          Store.set('tasks', data.tasks||[]);
          Store.set('tags', data.tags||[]);
          Store.set('recycle', data.recycle||[]);
          Store.set('summaries', data.summaries||[]);
          Store.set('focus_logs', data.focus_logs||[]);
          if(data.settings) Store.saveSettings(data.settings);
        } else {
          // 合并模式
          if(data.plans) {
            const existing = Store.get('plans')||[];
            const existingIds = new Set(existing.map(p=>p.id));
            data.plans.forEach(p=>{ if(!existingIds.has(p.id)) existing.push(p); });
            Store.set('plans', existing);
          }
          if(data.tasks) {
            const existing = Store.get('tasks')||[];
            const existingIds = new Set(existing.map(t=>t.id));
            data.tasks.forEach(t=>{ if(!existingIds.has(t.id)) existing.push(t); });
            Store.set('tasks', existing);
          }
          if(data.tags) {
            const existing = Store.tags();
            data.tags.forEach(t=>{ if(!existing.includes(t)) existing.push(t); });
            Store.set('tags', existing);
          }
          if(data.categories) {
            const existing = Store.categories();
            const existingIds = new Set(existing.map(c=>c.id));
            data.categories.forEach(c=>{ if(!existingIds.has(c.id)) existing.push(c); });
            Store.set('categories', existing);
          }
        }

        App.toast('数据导入成功！🎉','success');

      }
    };

  },
};

// PART 22.5: 云同步模块
// ============================================================
const CloudSync = {
  _configKey: 'dp_sync_config',

  getConfig() {
    try { return JSON.parse(localStorage.getItem(this._configKey)) || {}; } catch(e) { return {}; }
  },
  saveConfig(cfg) {
    localStorage.setItem(this._configKey, JSON.stringify({...this.getConfig(), ...cfg}));
  },
  getToken() { return this.getConfig().token || ''; },
  getRepo() { return this.getConfig().repo || 'hulixiang393-web/day'; },
  getSyncPassword() { return this.getConfig().syncPassword || 'anime-sync-2026'; },
  isAutoSync() { return this.getConfig().autoSync === true; },
  getLastSync() { return this.getConfig().lastSync || null; },
  setLastSync() { this.saveConfig({lastSync: now()}); },

  toggleAuto() {
    this.saveConfig({autoSync: !this.isAutoSync()});
    if(this.isAutoSync()) { this.download(); }
  },

  _getSyncKey() {
    var pw = this.getSyncPassword();
    if(!pw) { App.toast('请先在设置中填写同步密码（两端必须一致）','error'); return null; }
    if(pw.length < 6) { App.toast('同步密码至少6位','error'); return null; }
    return pw;
  },

  packData() {
    var data = {
      version: 2,
      exportedAt: now(),
      categories: Store.get('categories'),
      plans: Store.get('plans'),
      tasks: Store.get('tasks'),
      tags: Store.get('tags'),
      recycle: Store.get('recycle'),
      summaries: Store.get('summaries'),
      focus_logs: Store.get('focus_logs'),
    };
    return JSON.stringify(data);
  },

  async upload() {
    var token = document.getElementById('sync-token') ? document.getElementById('sync-token').value : this.getToken();
    var repo = document.getElementById('sync-repo') ? document.getElementById('sync-repo').value : this.getRepo();
    var syncPwEl = document.getElementById('sync-password');
    var syncPw = syncPwEl ? syncPwEl.value : this.getSyncPassword();
    if(!token) { App.toast('请先设置 GitHub Token','error'); return; }
    if(!syncPw || syncPw.length < 6) { App.toast('请先设置同步密码（至少6位，两端必须一致）','error'); return; }

    this.saveConfig({token: token, repo: repo, syncPassword: syncPw});

    App.toast('正在加密并上传...','info');
    try {
      var json = this.packData();
      var encrypted = await aesEncrypt(json, syncPw);

      var sha = null;
      try {
        var getResp = await fetch('https://api.github.com/repos/'+repo+'/contents/backup/sync.apbak', {
          headers: { 'Authorization': 'token '+token, 'Accept': 'application/vnd.github+json' }
        });
        if(getResp.ok) { var fi = await getResp.json(); sha = fi.sha; }
      } catch(e) {}

      var body = {
        message: 'sync: '+today(),
        content: encrypted,
        branch: 'main'
      };
      if(sha) body.sha = sha;

      var resp = await fetch('https://api.github.com/repos/'+repo+'/contents/backup/sync.apbak', {
        method: 'PUT',
        headers: { 'Authorization': 'token '+token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if(resp.ok) {
        this.setLastSync();
        var stEl = document.getElementById('sync-status');
        if(stEl) stEl.textContent = '上次同步: '+formatDate(today());
        App.toast('同步上传成功！☁','success');
      } else {
        var err = await resp.json();
        App.toast('上传失败: '+(err.message||resp.status),'error');
      }
    } catch(e) {
      App.toast('上传失败: '+e.message,'error');
    }
  },

  async download() {
    var token = document.getElementById('sync-token') ? document.getElementById('sync-token').value : this.getToken();
    var repo = document.getElementById('sync-repo') ? document.getElementById('sync-repo').value : this.getRepo();
    var syncPwEl = document.getElementById('sync-password');
    var syncPw = syncPwEl ? syncPwEl.value : this.getSyncPassword();
    if(!token) { App.toast('请先设置 GitHub Token','error'); return; }
    if(!syncPw || syncPw.length < 6) { App.toast('请先设置同步密码（至少6位，两端必须一致）','error'); return; }

    this.saveConfig({token: token, repo: repo, syncPassword: syncPw});

    App.toast('正在从云端下载...','info');
    try {
      var resp = await fetch('https://api.github.com/repos/'+repo+'/contents/backup/sync.apbak', {
        headers: { 'Authorization': 'token '+token, 'Accept': 'application/vnd.github+json' }
      });

      if(!resp.ok) {
        if(resp.status === 404) { App.toast('云端暂无备份，请先上传','info'); }
        else { var err2 = await resp.json(); App.toast('下载失败: '+(err2.message||resp.status),'error'); }
        return;
      }

      var info = await resp.json();
      // GitHub API content 是 base64，aesDecrypt 内部会 atob 解码
      var encrypted = info.content.replace(/\n/g, '');

      var decrypted = await aesDecrypt(encrypted, syncPw);
      if(!decrypted) {
        App.toast('解密失败！请确认同步密码与上传时一致','error');
        return;
      }

      var data = JSON.parse(decrypted);
      if(!data.version || (!Array.isArray(data.plans) && !Array.isArray(data.tasks))) {
        App.toast('云端数据格式无效','error');
        return;
      }

      // 合并模式导入
      if(data.plans) {
        var existingPlans = Store.get('plans')||[];
        var existingIds = new Set(existingPlans.map(function(p){return p.id;}));
        data.plans.forEach(function(p){ if(!existingIds.has(p.id)) existingPlans.push(p); });
        Store.set('plans', existingPlans);
      }
      if(data.tasks) {
        var existingTasks = Store.get('tasks')||[];
        var existingTIds = new Set(existingTasks.map(function(t){return t.id;}));
        data.tasks.forEach(function(t){ if(!existingTIds.has(t.id)) existingTasks.push(t); });
        Store.set('tasks', existingTasks);
      }
      if(data.tags) {
        var existingTags = Store.tags();
        data.tags.forEach(function(t){ if(existingTags.indexOf(t)===-1) existingTags.push(t); });
        Store.set('tags', existingTags);
      }
      if(data.categories) {
        var existingCats = Store.categories();
        var existingCIds = new Set(existingCats.map(function(c){return c.id;}));
        data.categories.forEach(function(c){ if(!existingCIds.has(c.id)) existingCats.push(c); });
        Store.set('categories', existingCats);
      }
      if(data.summaries) {
        var existingSums = Store.get('summaries')||[];
        var existingSIds = new Set(existingSums.map(function(s){return s.weekStart;}));
        data.summaries.forEach(function(s){ if(!existingSIds.has(s.weekStart)) existingSums.push(s); });
        Store.set('summaries', existingSums);
      }
      if(data.focus_logs) {
        var existingLogs = Store.get('focus_logs')||[];
        Store.set('focus_logs', existingLogs.concat(data.focus_logs));
      }

      this.setLastSync();
      var stEl2 = document.getElementById('sync-status');
      if(stEl2) stEl2.textContent = '上次同步: '+formatDate(today());
      EventBus.emit('data-changed', {type:'sync-import'});
      App.toast('云端数据同步成功！☁','success');
      App.refreshCurrentView();
      App.renderCategories();
    } catch(e) {
      App.toast('下载失败: '+e.message,'error');
    }
  },

  init() {
    if(this.isAutoSync()) {
      setTimeout(function(){ CloudSync.download(); }, 2000);
      setInterval(function(){ CloudSync.download(); }, 1800000);
    }
  }
};

const Keyboard = {
  init() {
    document.addEventListener('keydown', (e) => {
      // Boss Key
      if(e.ctrlKey && e.shiftKey && e.key==='B') {
        e.preventDefault();
        PG.toggleBossKey();
        return;
      }

      // Escape 关闭弹窗/专注模式
      if(e.key==='Escape' && !e.ctrlKey && !e.shiftKey && !e.metaKey) {
        if(document.getElementById('focus-overlay').classList.contains('active')) {
          FocusTimer.stop(); return;
        }
        const backdrop = document.querySelector('.modal-backdrop');
        if(backdrop) { backdrop.remove(); return; }
        if(document.getElementById('detail-panel').classList.contains('open')) {
          App.closeDetail(); return;
        }
      }
      // 在输入框中不触发快捷键
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;

      if(e.ctrlKey || e.metaKey) {
        switch(e.key.toLowerCase()) {
          case 'n': e.preventDefault(); App.showPlanForm(); break;
          case 'k': e.preventDefault(); document.getElementById('search-input').focus(); break;
          case 'f': e.preventDefault(); FocusTimer.startCustom(25); break;
          case 'l': e.preventDefault(); PG.lock(); break;
        }
      } else {
        switch(e.key) {
          case '1': App.switchView('list'); break;
          case '2': App.switchView('day'); break;
          case '3': App.switchView('week'); break;
          case '4': App.switchView('month'); break;
          case '5': App.switchView('summary'); break;
          case 'Escape':
            if(document.getElementById('boss-overlay').classList.contains('active')) {
              PG.toggleBossKey();
            }
            break;
        }
      }
    });

    // 定期检查是否该生成周总结
    App.generateWeeklySummary();
    App._summaryInterval = setInterval(function(){App.generateWeeklySummary();}, 3600000);
  }
};

// PWA Service Worker 注册
if('serviceWorker' in navigator) {
  // 创建内联 SW
  const swCode = `
    const CACHE = 'anime-planner-v2';
    const ASSETS = [self.location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).catch(()=>{}));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      if(e.request.method !== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(cached =>
          cached || fetch(e.request).then(resp => {
            if(resp.ok) {
              const clone = resp.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone));
            }
            return resp;
          }).catch(() => cached || new Response('Offline', {status:503}))
        )
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(function(){URL.revokeObjectURL(swUrl);}).catch(function(){URL.revokeObjectURL(swUrl);});
}

// 尝试自动加载本地图片作为小人形象
(async function autoLoadMascot() {
  const s = Store.settings();
  if(s.mascotImage) return; // 已有自定义形象，跳过
  // 尝试加载同目录下的 webp/png 图片
  const tryFiles = [
    'c8c87684ac025bd7daa759cdc8811c74383db19576488-SzSjIL_fw658.webp',
    'mascot.webp', 'mascot.png', 'mascot.jpg',
  ];
  for(const file of tryFiles) {
    try {
      const img = await new Promise((resolve, reject) => {
        const i = new Image();
        i.crossOrigin = 'anonymous';
        i.onload = () => resolve(i);
        i.onerror = () => reject();
        i.src = file;
      });
      // 抠图处理
      const size = 160;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const sw = size/scale, sh = size/scale;
      const sx = (img.width-sw)/2, sy = (img.height-sh)/2;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);
      const imageData = ctx.getImageData(0, 0, size, size);
      const pixels = imageData.data;
      // 从边缘采样背景色
      const samples = [];
      for(let x=0; x<size; x++) {
        for(let y=0; y<4; y++) {
          const i=(y*size+x)*4;
          samples.push([pixels[i],pixels[i+1],pixels[i+2]]);
        }
        for(let y=size-4; y<size; y++) {
          const i=(y*size+x)*4;
          samples.push([pixels[i],pixels[i+1],pixels[i+2]]);
        }
      }
      for(let y=4; y<size-4; y++) {
        for(let x=0; x<4; x++) {
          const i=(y*size+x)*4;
          samples.push([pixels[i],pixels[i+1],pixels[i+2]]);
        }
        for(let x=size-4; x<size; x++) {
          const i=(y*size+x)*4;
          samples.push([pixels[i],pixels[i+1],pixels[i+2]]);
        }
      }
      const refR = samples.reduce((s,c)=>s+c[0],0)/samples.length;
      const refG = samples.reduce((s,c)=>s+c[1],0)/samples.length;
      const refB = samples.reduce((s,c)=>s+c[2],0)/samples.length;
      const tolerance = 70;
      for(let i=0; i<pixels.length; i+=4) {
        const dist = Math.sqrt((pixels[i]-refR)**2+(pixels[i+1]-refG)**2+(pixels[i+2]-refB)**2);
        if(dist < tolerance) {
          pixels[i+3] = Math.round(Math.min(1, dist/tolerance) * 255);
        }
      }
      ctx.putImageData(imageData, 0, 0);
      const dataUrl = canvas.toDataURL('image/png');
      Store.saveSettings({mascotImage: dataUrl});
      console.log('🌸 已自动加载并处理本地小人图片，刷新后生效');
      break;
    } catch(e) {
      // 文件不存在或加载失败，使用默认SVG
    }
  }
})();
