<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFB8C6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="二次元计划表">
<meta name="description" content="二次元风格跨端计划表 - 日程管理、习惯打卡、番茄钟专注">
<title>🌸 二次元计划表</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">

<!-- 基础样式 -->
<link rel="stylesheet" href="css/base/reset.css">
<link rel="stylesheet" href="css/base/variables.css">
<link rel="stylesheet" href="css/base/typography.css">
<link rel="stylesheet" href="css/base/layout.css">
<link rel="stylesheet" href="css/base/animations.css">

<!-- 主题 -->
<link rel="stylesheet" href="css/themes/light.css">
<link rel="stylesheet" href="css/themes/dark.css">
<link rel="stylesheet" href="css/themes/macaron.css">

<!-- 组件样式 -->
<link rel="stylesheet" href="css/components/button.css">
<link rel="stylesheet" href="css/components/card.css">
<link rel="stylesheet" href="css/components/modal.css">
<link rel="stylesheet" href="css/components/form.css">
<link rel="stylesheet" href="css/components/task.css">
<link rel="stylesheet" href="css/components/calendar.css">
<link rel="stylesheet" href="css/components/mascot.css">
<link rel="stylesheet" href="css/components/toast.css">
<link rel="stylesheet" href="css/components/empty-state.css">
<link rel="stylesheet" href="css/components/badge.css">
<link rel="stylesheet" href="css/components/auth.css">

<!-- 响应式 -->
<link rel="stylesheet" href="css/responsive/mobile.css">
<link rel="stylesheet" href="css/responsive/tablet.css">
<link rel="stylesheet" href="css/responsive/desktop.css">

<!-- 打印样式 -->
<link rel="stylesheet" href="css/print.css">
</head>
<body>

<!-- 密码锁 -->
<div id="auth-overlay" class="auth-overlay">
  <div class="auth-card animate-pop-in" style="max-width:400px">
    <div class="auth-icon">🌸</div>
    <h2 id="auth-title">二次元计划表</h2>
    <p id="auth-desc" class="text-secondary text-sm"></p>
    <div id="auth-form" class="auth-input-wrap"></div>
    <p id="auth-error" class="text-sm text-priority-urgent mt-2" style="display:none"></p>
    <div id="auth-attempts" class="text-xs text-muted mt-2"></div>
    <div id="auth-bottom" class="mt-3"></div>
  </div>
</div>

<!-- 背景壁纸层 -->
<div id="wallpaper-layer"></div>

<!-- 特效层 (樱花、粒子等) -->
<div id="effects-layer"></div>

<!-- 应用外壳 -->
<div id="app" class="app-shell">
  <!-- 顶部栏 -->
  <header id="app-header" class="app-header">
    <div class="header-left">
      <button id="sidebar-toggle" class="btn-icon" title="菜单" aria-label="切换侧边栏">
        <span class="icon-menu">☰</span>
      </button>
      <h1 class="app-title">🌸 计划表</h1>
    </div>
    <div class="header-center">
      <div id="search-bar" class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="search-input" placeholder="搜索任务、标签、备注..." autocomplete="off">
        <button id="search-clear" class="search-clear hidden">✕</button>
      </div>
    </div>
    <div class="header-right">
      <button id="btn-theme" class="btn-icon" title="切换主题" aria-label="切换主题">
        <span class="icon-theme">🎨</span>
      </button>
      <button id="btn-mini-window" class="btn-icon" title="悬浮小窗" aria-label="悬浮小窗">
        <span>🪟</span>
      </button>
      <button id="btn-settings" class="btn-icon" title="设置" aria-label="设置">
        <span>⚙️</span>
      </button>
    </div>
  </header>

  <div class="app-body">
    <!-- 左侧导航栏 (PC) -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">视图</div>
        <a href="#/list" class="sidebar-item" data-route="/list">
          <span class="sidebar-icon">📋</span>
          <span class="sidebar-text">清单</span>
        </a>
        <a href="#/day" class="sidebar-item" data-route="/day">
          <span class="sidebar-icon">☀️</span>
          <span class="sidebar-text">日视图</span>
        </a>
        <a href="#/week" class="sidebar-item" data-route="/week">
          <span class="sidebar-icon">📅</span>
          <span class="sidebar-text">周视图</span>
        </a>
        <a href="#/month" class="sidebar-item" data-route="/month">
          <span class="sidebar-icon">🗓️</span>
          <span class="sidebar-text">月视图</span>
        </a>
        <a href="#/timeline" class="sidebar-item" data-route="/timeline">
          <span class="sidebar-icon">✨</span>
          <span class="sidebar-text">时间线</span>
        </a>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">功能</div>
        <a href="#/habits" class="sidebar-item" data-route="/habits">
          <span class="sidebar-icon">✅</span>
          <span class="sidebar-text">习惯打卡</span>
        </a>
        <a href="#/pomodoro" class="sidebar-item" data-route="/pomodoro">
          <span class="sidebar-icon">🍅</span>
          <span class="sidebar-text">番茄钟</span>
        </a>
        <a href="#/stats" class="sidebar-item" data-route="/stats">
          <span class="sidebar-icon">📊</span>
          <span class="sidebar-text">数据统计</span>
        </a>
        <a href="#/templates" class="sidebar-item" data-route="/templates">
          <span class="sidebar-icon">📦</span>
          <span class="sidebar-text">模板中心</span>
        </a>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">分类</div>
        <div id="category-nav" class="category-nav"></div>
      </div>

      <div class="sidebar-footer">
        <button id="btn-quick-add" class="btn-primary btn-full" title="快速新建任务 (Ctrl+N)">
          <span>＋ 新建任务</span>
        </button>
      </div>
    </nav>

    <!-- 主内容区 -->
    <main id="main-content" class="main-content">
      <div id="view-container" class="view-container">
        <!-- 默认欢迎页 -->
        <div id="welcome-page" class="welcome-page">
          <div class="welcome-illustration">🌸</div>
          <h2>欢迎使用二次元计划表</h2>
          <p class="welcome-subtitle">选择左侧视图开始管理你的计划吧 ✨</p>
          <div class="welcome-actions">
            <button class="btn-primary btn-lg" id="welcome-add-task">＋ 创建第一个任务</button>
            <button class="btn-secondary btn-lg" id="welcome-template">📦 从模板开始</button>
          </div>
        </div>
      </div>
    </main>

    <!-- 右侧详情面板 (PC) -->
    <aside id="detail-panel" class="detail-panel hidden">
      <div class="detail-panel-header">
        <h3 id="detail-title">任务详情</h3>
        <button id="detail-close" class="btn-icon">✕</button>
      </div>
      <div id="detail-content" class="detail-panel-content"></div>
    </aside>
  </div>

  <!-- 移动端底部导航 -->
  <nav id="mobile-nav" class="mobile-nav">
    <a href="#/list" class="mobile-nav-item" data-route="/list">
      <span class="mobile-nav-icon">📋</span>
      <span class="mobile-nav-text">清单</span>
    </a>
    <a href="#/day" class="mobile-nav-item" data-route="/day">
      <span class="mobile-nav-icon">☀️</span>
      <span class="mobile-nav-text">日视图</span>
    </a>
    <button id="mobile-add-btn" class="mobile-add-btn" aria-label="新建任务">
      <span>＋</span>
    </button>
    <a href="#/habits" class="mobile-nav-item" data-route="/habits">
      <span class="mobile-nav-icon">✅</span>
      <span class="mobile-nav-text">习惯</span>
    </a>
    <a href="#/stats" class="mobile-nav-item" data-route="/stats">
      <span class="mobile-nav-icon">📊</span>
      <span class="mobile-nav-text">统计</span>
    </a>
  </nav>
</div>

<!-- 弹窗容器 -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-container" class="modal-container"></div>
</div>

<!-- 看板娘 -->
<div id="mascot" class="mascot" data-state="idle">
  <div id="mascot-character" class="mascot-character">🐱</div>
  <div id="mascot-speech" class="mascot-speech hidden"></div>
</div>

<!-- Toast消息容器 -->
<div id="toast-container" class="toast-container"></div>

<!-- 撤销提示 -->
<div id="undo-bar" class="undo-bar hidden">
  <span id="undo-message"></span>
  <button id="undo-btn" class="btn-text">撤销</button>
  <button id="undo-close" class="btn-icon">✕</button>
</div>

<!-- 注册 Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  });
}
</script>

<!-- 应用入口 -->
<script type="module" src="js/app.js"></script>
</body>
</html>
