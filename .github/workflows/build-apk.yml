name: 构建 Android APK

on:
  push:
    branches: [main]
    paths:
      - 'daily-planner/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daily-planner

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 准备 www 目录
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp sw.js www/
          cp -r css www/
          cp -r js www/
          cp -r assets www/ 2>/dev/null || true

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 同步 Capacitor
        run: npx cap sync android

      - name: 构建 APK
        working-directory: daily-planner/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 二次元计划表-APK
          path: daily-planner/android/app/build/outputs/apk/debug/app-debug.apk
